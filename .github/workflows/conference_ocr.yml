name: Conference Photo OCR

on:
  workflow_dispatch:
    inputs:
      photos_path:
        description: "Folder in this repo containing photos (default: photos)"
        default: "photos"
        required: false
      output_file:
        description: "Output filename (default: conference_notes.md)"
        default: "conference_notes.md"
        required: false
      board_id:
        description: "Trello board ID (leave blank to use the TRELLO_BOARD_ID secret)"
        default: ""
        required: false

jobs:
  ocr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OCR pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ inputs.board_id || secrets.TRELLO_BOARD_ID }}
        run: |
          python conference_ocr.py \
            --photos-dir "${{ inputs.photos_path }}" \
            --output "${{ inputs.output_file }}"

      - name: Commit notes back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_file }}"
          git diff --cached --quiet || git commit -m "Add generated conference notes"
          git push
